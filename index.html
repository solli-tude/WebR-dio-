<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Web Rádio</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
}

.radio-bar {
  position: fixed;
  width: 100%;
  top: 0;
  left: 0;
  background: #000;
  display: flex;
  justify-content: center;
  padding: 6px 0;
  z-index: 99999;
  border-bottom: 1px solid #222;
}

.radio {
  max-width: 360px;
  width: 100%;
  text-align: center;
  color: #fff;
}

.radio-title {
  font-size: 10px;
  letter-spacing: 3px;
  margin-bottom: 3px;
  color: #fff;
}

.radio-controls-top {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.radio-controls-top button {
  background: transparent;
  border: none;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  opacity: 0.85;
}

.radio-controls-top button:hover {
  opacity: 1;
}
</style>

</head>

<body>

<div class="radio-bar">
  <div class="radio">

    <div class="radio-title">••• WEB RÁDIO •••</div>

    <div class="radio-controls-top">
      <button onclick="anterior()">&#8249;</button>
      <button id="playBtn" onclick="playPause()">▶</button>
      <button onclick="proxima()">&#8250;</button>
    </div>

<audio id="audio" preload="auto"></audio>

  </div>
</div>

<script>
const playlist = [
  "https://files.catbox.moe/63zj6v.mp3",

  "https://files.catbox.moe/kf18h1.mp3"
];

let atual = 0;

const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");

function carregar() {
  audio.src = playlist[atual];
  audio.load();
}

function playPause() {
  if (audio.paused) {
    audio.play();
    playBtn.textContent = "❚❚";
  } else {
    audio.pause();
    playBtn.textContent = "▶";
  }
}

function proxima() {
  atual = (atual + 1) % playlist.length;
  carregar();
  audio.play().catch(() => {});
  playBtn.textContent = "❚❚";
}

function anterior() {
  atual = (atual - 1 + playlist.length) % playlist.length;
  carregar();
  audio.play().catch(() => {});
  playBtn.textContent = "❚❚";
}

audio.onended = proxima;

carregar();
</script>

</body>
</html>
