<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  padding: 0;
  background:#000;
  display:flex;
  justify-content:center;
  height:200%;
}

.poster{
  position:relative;
  max-width:1100px;
}

.poster img{
  width:100%;
  display:block;
  margin-top:30px;
}
.radio{
  max-width: 100dvw;
  max-height: 100dvh;
  padding: 0
}
.radio-bar{
  position:absolute;
  bottom:140px;
  right:55px;
  width:180px;
  z-index:999;
}

.radio-title{
  color:#fff;
  font-size:12px;
  text-align:center;
  margin-bottom:5px;
}

.radio-controls-top{
  display:flex;
  justify-content:center;
  gap:5px;
}

button{
  cursor:pointer; 
}
  .footer{
  background:#2b2b2b; /* cinza escuro */
  color:#fff;
  font-family: Verdana, sans-serif;
  font-weight:bold;
  text-align:center;
  padding:20px;
  width:99%;
  margin-top: 0;
  position:fixed;
    
}
</style>
</head>

<body>

<div class="poster">

  <img src="2A00A33E-D7CF-4FC9-A39F-190F849B052D.png">

  <div class="radio-bar">

    <div class="radio">
      <div class="radio-title">••• WEB RÁDIO •••</div>

      <div class="radio-controls-top">
        <button onclick="anterior()">&#8249;</button>
        <button id="playBtn" onclick="playPause()">▶</button>
        <button onclick="proxima()">&#8250;</button>
      </div>

      <audio id="audio" preload="auto"></audio>
    </div>

  </div>
  <footer class="footer">
  Dopamina, você pode durar só mais um segundo?
</footer>
</div>
<script>
const playlist = [
  "https://files.catbox.moe/63zj6v.mp3",
  "https://files.catbox.moe/o6xmpu.mp3"
  // restante igual
];

let atual = 0;

const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");

function carregar() {
  audio.src = playlist[atual];
  audio.load();
}

function playPause() {
  if (audio.paused) {
    audio.play();
    playBtn.textContent = "❚❚";
  } else {
    audio.pause();
    playBtn.textContent = "▶";
  }
}

function proxima() {
  atual = (atual + 1) % playlist.length;
  carregar();
  audio.play().catch(() => {});
  playBtn.textContent = "❚❚";
}

function anterior() {
  atual = (atual - 1 + playlist.length) % playlist.length;
  carregar();
  audio.play().catch(() => {});
  playBtn.textContent = "❚❚";
}

audio.onended = proxima;

carregar();
</script>
</body>
</html>
