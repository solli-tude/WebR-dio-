<!DOCTYPE html>
<html lang="pt-br">

<style>
body{
  margin:0;
  padding: 0;
  background:#000000;
  display:flex;
  justify-content:center;
  height:100%;
}

.poster{
  position:relative;
  max-width:1200px;
}

.poster img{
  width:100%;
  display:block;
  margin-top:30px;
  -webkit-user-drag: none;
  user-select: none;
  pointer-events: none;
}
.radio{
  max-width: 100dvw;
  max-height: 100dvh;
  padding: 0
}
.radio-bar{
  position:absolute;
  bottom:432px;
  right:115px;
  width:180px;
  z-index:999;
}

.radio-title{
  color:#fff;
  font-size:20px;
  font-family: verdana;
  text-align:center;
  letter-spacing: 1px;
  margin-bottom:5px;
}

.radio-controls-top{
  display:flex;
  justify-content:center;
  gap:5px;
}

button{
  cursor:pointer; 
}
.radio-controls-top button {
  appearance: none !important;
  -webkit-appearance: none !important;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  color: #fff !important;
  font-size: 30px !important;
  cursor: pointer !important;
  opacity: 0.85 !important;
  padding: 0 !important;
  margin: 0 !important;
  width: 45px;
  height: 45px;
}

.radio-controls-top button:hover {
  opacity: 1 !important;
}
.footer{
  background:#2b2b2b; /* cinza escuro */
  color:#fff;
  font-family: Verdana, sans-serif;
  font-weight:bold;
  text-align:center;
  padding:20px;
  margin-top: 0;
  position:fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%; 
  box-sizing: border-box;

}
.footer a {
  color: #ffffff;
  text-decoration: none;
}
.footer a:hover {
  color:#e0e0e0;    
}
</style>
</head>

  <footer class="footer">

function carregar() {
  audio.src = playlist[atual];
  audio.load();
}

function playPause() {
  if (audio.paused) {
    audio.play();
    playBtn.textContent = "❚❚";
  } else {
    audio.pause();
    playBtn.textContent = "▶";
  }
}

function proxima() {
  atual = (atual + 1) % playlist.length;
  carregar();
  audio.play().catch(() => {});
  playBtn.textContent = "❚❚";
}

function anterior() {
  atual = (atual - 1 + playlist.length) % playlist.length;
  carregar();
  audio.play().catch(() => {});
  playBtn.textContent = "❚❚";
}

audio.onended = proxima;
